services:
  postgres:
    image: postgres:16
    container_name: pgdocker
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-init:
    image: postgres:16
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    volumes:
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    entrypoint: ["/bin/bash", "/docker-entrypoint-initdb.d/init-databases.sh"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8081:8080"
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.1
    restart: "no"
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: vkr
      MINIO_CONSOLE_URL: http://localhost:9001
      MINIO_OIDC_REDIRECT_URI: http://localhost:9001/oauth_callback
      MINIO_CLIENT_ID: minio-console
      MINIO_CLIENT_SECRET: minio-console-secret
      MINIO_TEST_USERNAME: minio-user
      MINIO_TEST_PASSWORD: minio-user
    volumes:
      - ./keycloak/init-keycloak.sh:/opt/keycloak/bootstrap/init-keycloak.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak/bootstrap/init-keycloak.sh"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001

      MINIO_IDENTITY_OPENID_CONFIG_URL: http://keycloak:8080/realms/vkr/.well-known/openid-configuration
      MINIO_IDENTITY_OPENID_CLIENT_ID: minio-console
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: minio-console-secret
      MINIO_IDENTITY_OPENID_DISPLAY_NAME: Keycloak
      MINIO_IDENTITY_OPENID_ROLE_POLICY: consoleAdmin
      MINIO_IDENTITY_OPENID_REDIRECT_URI: http://localhost:9001/oauth_callback
      MINIO_IDENTITY_OPENID_SCOPES: openid,profile,email

    ports:
      - "9000:9000"
      - "9001:9001"
    depends_on:
      keycloak-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
