services:
  postgres:
    image: postgres:16
    container_name: pgdocker
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
      - -c
      - track_commit_timestamp=on
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-init:
    image: postgres:16
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    volumes:
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    entrypoint: ["/bin/bash", "/docker-entrypoint-initdb.d/init-databases.sh"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8081:8080"
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.1
    restart: "no"
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: vkr
      MINIO_CONSOLE_URL: http://localhost:9001
      MINIO_OIDC_REDIRECT_URI: http://localhost:9001/oauth_callback
      MINIO_CLIENT_ID: minio-console
      MINIO_CLIENT_SECRET: minio-console-secret
      SYSTEM_ROLES_CLIENT_ID: system-roles
      SYSTEM_ROLES_CLAIM_NAME: system_roles
      INGESTION_SYSTEM_ROLE: ingestion_rw
      AIRFLOW_STS_CLIENT_ID: airflow-minio-sts
      AIRFLOW_STS_CLIENT_SECRET: airflow-minio-sts-secret
      AIRFLOW_CONTRACTS_CLIENT_ID: airflow-contracts
      AIRFLOW_CONTRACTS_CLIENT_SECRET: airflow-contracts-secret
      AIRFLOW_AUTH_CLIENT_ID: airflow-auth
      AIRFLOW_AUTH_CLIENT_SECRET: airflow-auth-secret
      AIRFLOW_AUTH_ROOT_URL: http://localhost:8088
      CONTRACTS_API_CLIENT_ID: contracts-api
      CONTRACTS_CLIENT_ID: contracts-client
      CONTRACTS_CLIENT_SECRET: contracts-client-secret
      CONTRACTS_UI_DEV_CLIENT_ID: contracts-ui-dev
      CONTRACTS_UI_DEV_ROOT_URL: http://localhost:8000
      CONTRACTS_UI_DEV_REDIRECT_URI: http://localhost:8000/docs/oauth2-redirect
      CONTRACTS_READER_ROLE: contracts_reader
      MINIO_TEST_USERNAME: minio-user
      MINIO_TEST_PASSWORD: minio-user
    volumes:
      - ./keycloak/init-keycloak.sh:/opt/keycloak/bootstrap/init-keycloak.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak/bootstrap/init-keycloak.sh"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001

      MINIO_IDENTITY_OPENID_CONFIG_URL: http://keycloak:8080/realms/vkr/.well-known/openid-configuration
      MINIO_IDENTITY_OPENID_CLIENT_ID: minio-console
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: minio-console-secret
      MINIO_IDENTITY_OPENID_CLAIM_NAME: system_roles
      MINIO_IDENTITY_OPENID_DISPLAY_NAME: Keycloak
      MINIO_IDENTITY_OPENID_REDIRECT_URI: http://localhost:9001/oauth_callback
      MINIO_IDENTITY_OPENID_SCOPES: openid,profile,email
      MINIO_PROMETHEUS_AUTH_TYPE: public

    ports:
      - "9000:9000"
      - "9001:9001"
    depends_on:
      keycloak-init:
        condition: service_completed_successfully

  minio-init:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ALIAS: local
      MINIO_URL: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      POLICIES_DIR: /policies
      LANDING_BUCKET_NAME: ingestion-landing
      LANDING_BUCKET_ENABLE_VERSIONING: "true"
    volumes:
      - ./minio/init-minio.sh:/bootstrap/init-minio.sh:ro
      - ./minio/policies:/policies:ro
    entrypoint: ["/bin/sh", "/bootstrap/init-minio.sh"]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yaml
    volumes:
      - ./observability/postgres-exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    ports:
      - "9187:9187"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8082:8080"

  node-exporter:
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    depends_on:
      postgres-exporter:
        condition: service_started
      minio:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  grafana_data:
